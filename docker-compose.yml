version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db_faesb
    environment:
      POSTGRES_DB: sistema_faesb_lite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: api_faesb
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sistema_faesb_lite
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SERVER_ADDRESS=0.0.0.0
    depends_on:
      - db

  frontend:
    build: 
      context: ./frontend
      target: development # <--- ISSO ativa o modo rápido no seu PC
    container_name: web_faesb
    ports:
      - "5173:5173"
    depends_on:
      - backend