spring:
  application:
    name: sistema-castracao-faesb

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # Se não houver variável, usa 'dev'

  jackson:
    time-zone: America/Sao_Paulo

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

---
# ==============================================================
# PERFIL DE DESENVOLVIMENTO (LOCAL / DOCKER DEV)
# ==============================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # Ajustado para aceitar a URL do Docker Compose, mas manter localhost como padrão
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sistema_faesb_lite?charSet=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: sistemacastracao@gmail.com
    password: agzukgtpwktzlwgc # Sua App Password do Gmail
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

api:
  security:
    env: dev

# Credenciais Cloudinary (Fixas para Dev)
cloudinary:
  cloud_name: dgx8c2jv5
  api_key: "742974267684628"
  api_secret: 9g3Aqg6mnHek0j0PFi3-IF6Hbkk

---
# ==============================================================
# PERFIL DE PRODUÇÃO (RENDER / NUVEM)
# ==============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  mail:
    host: smtp.sendgrid.net
    port: 2525
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 3000
        timeout: 3000

api:
  security:
    env: prod

# Credenciais pegas das Environment Variables do Render
cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

# Configuração de Servidor (Ajustada para Docker/Nuvem)
server:
  address: 0.0.0.0
  port: ${PORT:8080}