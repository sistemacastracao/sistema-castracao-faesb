spring:
  application:
    name: sistema-castracao-faesb

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    time-zone: America/Sao_Paulo

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# Mapeamento Global do Seeder (Lê do .env em Dev ou da Nuvem em Prod)
seeder:
  admin:
    nome: ${ADMIN_MASTER_NOME}
    email: ${ADMIN_MASTER_EMAIL}
    password: ${ADMIN_MASTER_PASSWORD}
  pix:
    chave: ${PIX_CHAVE}
    tipo: ${PIX_TIPO_CHAVE}
    recebedor: ${PIX_RECEBEDOR}
    documento: ${PIX_DOCUMENTO}
    banco: ${PIX_BANCO}
    agencia: ${PIX_AGENCIA}
    conta: ${PIX_CONTA}
    valor: ${PIX_VALOR_TAXA}

---
# ==============================================================
# PERFIL DE DESENVOLVIMENTO (LOCAL / DOCKER DEV)
# ==============================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sistema_faesb_lite?charSet=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Sao_Paulo
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD} # Puxa do .env (segurança)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

api:
  security:
    env: dev

cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

---
# ==============================================================
# PERFIL DE PRODUÇÃO (RENDER / NUVEM)
# ==============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  mail:
    host: smtp.sendgrid.net
    port: 2525
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 3000
        timeout: 3000

api:
  security:
    env: prod

cloudinary:
  cloud_name: ${CLOUDINARY_NAME}
  api_key: ${CLOUDINARY_KEY}
  api_secret: ${CLOUDINARY_SECRET}

server:
  address: 0.0.0.0
  port: ${PORT:8080}